<!DOCTYPE html>
<html>
<head>
    <title>Sign In</title>
    <style>
        nav { background: #333545; padding: 15px; color: white; }
        nav a { color: white; margin-right: 15px; text-decoration: none; }
        .login-box { width: 300px; margin: 50px auto; border: 1px solid #ccc; padding: 20px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; }
        button { background: #f84464; color: white; border: none; padding: 10px 20px; width: 100%; cursor: pointer; }
        #error-msg { color: red; display: none; margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>

<nav>
    <a href="index.html">Home</a>
    <a href="sports.html">Sports</a>
    <a href="login.html">Sign In</a>
</nav>

<div class="login-box">
    <h3>Sign In with Google</h3>
    <form id="google-form">
        <input type="email" id="email" placeholder="Enter Gmail" required>
        <input type="password" id="pass" placeholder="Password" required>
        <button type="submit" id="submit-btn">Continue</button>
    </form>
    <div id="error-msg">Invalid account details. Google could not verify this account.</div>
</div>

<script>
    document.getElementById('google-form').onsubmit = function(e) {
        e.preventDefault();
        document.getElementById('error-msg').style.display = 'block';
    }
</script>

</body>
</html>
