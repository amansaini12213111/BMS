<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BMS Clone - Authentication</title>
    <style>
        :root { --primary: #f84464; --dark: #333545; --bg: #0b0b0c; --card-bg: #1f2128; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #fff; display: flex; flex-direction: column; min-height: 100vh; }
        
        nav { background: var(--dark); padding: 15px 10%; display: flex; justify-content: space-between; border-bottom: 1px solid #444; }
        .nav-links a { color: #fff; text-decoration: none; margin-left: 20px; font-size: 14px; }

        .auth-container { width: 350px; margin: auto; background: var(--card-bg); padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        .auth-tabs { display: flex; margin-bottom: 30px; border-bottom: 1px solid #333; }
        .tab { flex: 1; padding: 10px; cursor: pointer; opacity: 0.5; transition: 0.3s; }
        .tab.active { opacity: 1; border-bottom: 2px solid var(--primary); font-weight: bold; }

        input { width: 100%; padding: 12px; margin: 10px 0; background: #2a2d37; border: 1px solid #444; color: white; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:hover { background: #d63350; }

        #auth-message { margin-top: 20px; font-size: 14px; padding: 10px; border-radius: 4px; display: none; }
        .error { background: rgba(248, 68, 100, 0.1); color: #f84464; border: 1px solid #f84464; }
        .success { background: rgba(76, 175, 80, 0.1); color: #4caf50; border: 1px solid #4caf50; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<nav>
    <div style="font-weight: 800; color: var(--primary); font-size: 20px;">BMS CLONE</div>
    <div class="nav-links">
        <a href="index.html">Movies</a>
        <a href="sports.html">Sports</a>
        <a href="login.html" style="color: var(--primary);">Sign In</a>
    </div>
</nav>

<div class="auth-container">
    <div class="auth-tabs">
        <div id="login-tab" class="tab active" onclick="toggleAuth('login')">Login</div>
        <div id="register-tab" class="tab" onclick="toggleAuth('register')">Register</div>
    </div>

    <form id="login-form">
        <h3>Welcome Back</h3>
        <input type="email" id="login-email" placeholder="Email Address" required>
        <input type="password" id="login-password" placeholder="Password" required>
        <button type="submit" id="login-btn">Login</button>
    </form>

    <form id="register-form" class="hidden">
        <h3>Create Account</h3>
        <input type="text" id="reg-name" placeholder="Full Name" required>
        <input type="email" id="reg-email" placeholder="Email Address" required>
        <input type="password" id="reg-password" placeholder="Create Password" required>
        <button type="submit" id="register-btn">Register</button>
    </form>

    <div id="auth-message"></div>
</div>

<script>
    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');
    const authMessage = document.getElementById('auth-message');

    function toggleAuth(type) {
        authMessage.style.display = 'none';
        if (type === 'login') {
            loginForm.classList.remove('hidden');
            registerForm.classList.add('hidden');
            document.getElementById('login-tab').classList.add('active');
            document.getElementById('register-tab').classList.remove('active');
        } else {
            loginForm.classList.add('hidden');
            registerForm.classList.remove('hidden');
            document.getElementById('register-tab').classList.add('active');
            document.getElementById('login-tab').classList.remove('active');
        }
    }

    // Registration Logic
    registerForm.onsubmit = function(e) {
        e.preventDefault();
        const user = {
            name: document.getElementById('reg-name').value,
            email: document.getElementById('reg-email').value,
            pass: document.getElementById('reg-password').value
        };
        // Store user in localStorage
        localStorage.setItem(user.email, JSON.stringify(user));
        
        showMessage("Registration Successful! Please Login.", "success");
       // setTimeout(() => toggleAuth('login'), 1500);
    };

    // Login Logic
    loginForm.onsubmit = function(e) {
        e.preventDefault();
        const email = document.getElementById('login-email').value;
        const pass = document.getElementById('login-password').value;
        
        const storedUser = localStorage.getItem(email);
        
        if (storedUser) {
            const userData = JSON.parse(storedUser);
            if (userData.pass === pass) {
                showMessage("Login Successful! Redirecting...", "success");
                setTimeout(() => window.location.href = 'index.html', 1500);
            } else {
                showMessage("Invalid password. Please try again.", "error");
            }
        } else {
            showMessage("User not found. Please register first.", "error");
        }
    };

    function showMessage(text, type) {
        authMessage.textContent = text;
        authMessage.className = type;
        authMessage.style.display = 'block';
    }
</script>

</body>
</html>
